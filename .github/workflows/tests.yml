name: Laravel 9 Tests

on:
  push:
    branches:
      - feature/laravel9-foundation
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: diaspora_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, dom, fileinfo, mysql, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer config audit.block-insecure false
          composer install --no-interaction --prefer-dist --no-progress

      - name: Configure application
        run: |
          cp .env.example .env
          php artisan key:generate
          {
            echo "APP_ENV=testing"
            echo "APP_DEBUG=true"
            echo "APP_URL=http://localhost"
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=diaspora_test"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=root"
            echo "ADMIN_EMAIL=admin@example.com"
            echo "ADMIN_PHONE=+70000000000"
            echo "ADMIN_PASSWORD=ChangeMe123!"
          } >> .env

      - name: Migrate and seed
        run: php artisan migrate:fresh --seed --force

      - name: Validate routes
        run: php artisan route:list

      - name: Run tests
        run: php artisan test
